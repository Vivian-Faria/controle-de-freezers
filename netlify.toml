[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["data.json"]

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
